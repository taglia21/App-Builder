services:
  - type: web
    name: ignara-dashboard
    runtime: python
    buildCommand: pip install -r requirements-prod.txt
    startCommand: alembic upgrade head && uvicorn src.dashboard.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ignara-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ignara-redis
          type: keyvalue
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
    domains:
      - ignara.pro
      - www.ignara.pro
  - type: keyvalue
    name: ignara-redis
    ipAllowList: []
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: ignara-db
    databaseName: ignara
    user: ignara
